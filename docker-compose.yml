services:
  postgres:
    image: postgres:16-alpine
    container_name: padinho_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - padinho_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: padinho_backend
    restart: unless-stopped
    ports:
      - "3334:3334"
    environment:
      NODE_ENV: production
      PORT: 3334
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}?schema=public
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "npx prisma generate &&
             npx prisma db push --accept-data-loss &&
             npm start"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: padinho_frontend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: 3001
    depends_on:
      - backend

volumes:
  padinho_postgres_data:
